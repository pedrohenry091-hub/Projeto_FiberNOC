version: '3.9'

services:
  postgres:
    image: postgres:18-alpine
    container_name: fibernoc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fibernoc}
      POSTGRES_USER: ${POSTGRES_USER:-fibernoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fibernoc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fibernoc} -d ${POSTGRES_DB:-fibernoc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fibernoc-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-fibernoc}
      POSTGRES_USER: ${POSTGRES_USER:-fibernoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fibernoc}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fibernoc}:${POSTGRES_PASSWORD:-fibernoc}@postgres:5432/${POSTGRES_DB:-fibernoc}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
