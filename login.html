<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FiberNOC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <img src="logo.png" class="login-logo" alt="FiberNOC Logo">

    <h2>FiberNOC</h2>
    <p style="color: #64748b; margin-bottom: 20px;">Network Monitoring System</p>

    <div style="display: flex; flex-direction: column; gap: 10px;">
        <input type="text" placeholder="Usuário" style="padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1;">
        <input type="password" placeholder="Senha" style="padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1;">
        
        <button onclick="login()" style="padding: 12px; background: #0f172a; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;">
            Entrar
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
