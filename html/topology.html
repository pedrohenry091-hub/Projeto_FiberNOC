<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FiberNOC - Topologia OLT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .rack-olt { background: #334155; padding: 10px; border-radius: 5px; display: flex; gap: 5px; }
        .slot { width: 40px; height: 150px; background: #475569; border: 1px solid #94a3b8; color: white; writing-mode: vertical-rl; text-align: center; font-size: 10px; }
        .slot.active { background: #16a34a; }
    </style>
</head>
<body>
    <div id="main" class="main-content" style="margin-left: 0; padding: 40px;">
        <h2>Chassi AN5516-01</h2>
        <div class="rack-olt">
            <div class="slot">SLOT 1 (PWR)</div>
            <div class="slot active">SLOT 2 (GC8B)</div>
            <div class="slot active">SLOT 3 (GC8B)</div>
            <div class="slot">SLOT 4 (Vago)</div>
            <div class="slot active">SLOT 5 (HSWA)</div>
            <div class="slot active">SLOT 6 (HSWA)</div>
            <div class="slot">SLOT 7 (Vago)</div>
        </div>
        <button onclick="history.back()" style="margin-top: 20px;">Voltar</button>
    </div>
</body>
</html>
