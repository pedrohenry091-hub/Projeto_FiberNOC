<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberNOC - Dashboard</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }
        .user-info .username {
            font-size: 14px;
            color: #333;
        }
        .logout-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        .logout-btn:hover {
            background-color: #b71c1c;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<script src="../js/auth.js"></script>
<script>
    // Proteger página - redirecionar se não autenticado
    protectPage();
</script>

<aside class="sidebar" id="sidebar">
    <img src="../logo.png" class="sidebar-logo" alt="Logo FiberNOC">
    <h3>FiberNOC</h3>
    <nav>
        <a href="index.html"><strong>Dashboard</strong></a>
        <a href="topology.html"><strong>Topologia (OLT)</strong></a>
        <a href="onu.html"><strong>ONUs</strong></a>
        <a href="mapa.html"><strong>Mapa Lógico</strong></a>
        <a href="unauthorized.html"><strong>ONUs não autorizadas</strong></a>
        <a href="critical_signals.html"><strong>Sinal Crítico</strong></a>
        <a href="logs.html"><strong>Logs de Eventos</strong></a>
    </nav>
</aside>

<main class="main-content" id="main">
    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="menu-toggle" aria-label="Abrir menu">☰</button>
            <h1>Dashboard</h1>
        </div>
        <div class="user-info">
            <span class="username" id="currentUser">👤 Usuário</span>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </header>

    <div class="top-cards">
        <div class="mini-card online">
            <span>ONUs Online</span>
            <strong id="stat-online">-</strong>
        </div>

        <div class="mini-card offline">
            <span>ONUs Offline</span>
            <strong id="stat-offline">-</strong>
        </div>

        <div class="mini-card alert">
            <span>Alertas Recentes</span>
            <strong id="stat-alerts">-</strong>
        </div>

        <div class="mini-card">
            <span>Uso de CPU (OLT)</span>
            <strong id="stat-cpu">12%</strong> 
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h2>Status da Rede</h2>
            <p id="network-status">Sincronizando com o banco de dados...</p>
        </div>

        <div class="panel">
            <h2>Alertas Recentes</h2>
            <ul class="alerts" id="list-alerts">
            </ul>
        </div>
    </div>
</main>

<script type="module">
    // Mostrar nome do usuário logado
    const currentUser = getCurrentUser();
    if (currentUser) {
        document.getElementById('currentUser').textContent = `👤 ${currentUser}`;
    }
</script>

<script type="module" src="../js/main.js"></script>
</body>
</html>
