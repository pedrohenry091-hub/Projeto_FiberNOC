<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberNOC - Lista de ONUs</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<aside class="sidebar collapsed" id="sidebar">
    <img src="../logo.png" class="sidebar-logo" alt="Logo FiberNOC">
    <h3>FiberNOC</h3>
    <nav>
        <a href="index.html"><strong>Dashboard</strong></a>
        <a href="topology.html"><strong>Topologia (OLT)</strong></a>
        <a href="onu.html"><strong>ONUs</strong></a>
        <a href="unauthorized.html"><strong>ONUs não autorizadas</strong></a>
        <a href="critical_signals.html"><strong>Sinal Crítico</strong></a>
        <a href="logs.html"><strong>Logs de Eventos</strong></a>
    </nav>
</aside>

<main class="main-content expanded" id="main">
    <header>
        <button class="menu-toggle">☰</button>
        <h1>Lista de ONUs</h1>
    </header>

    <div style="margin-bottom: 20px;">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Buscar por Nome ou MAC..." 
            class="search-box"
        >
    </div>

    <div class="table-container">
        <table class="onu-table">
            <thead>
                <tr>
                    <th>Nome/User</th>
                    <th>SN / MAC</th>
                    <th>Status</th>
                    <th>Sinal (Rx)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-onus">
                </tbody>
        </table>
    </div>
</main>

<script type="module" src="../js/onus.js"></script>
</body>
</html>
