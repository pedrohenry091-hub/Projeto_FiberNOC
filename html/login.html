<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberNOC - Login</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            color: #388e3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .loading {
            display: none;
        }
        .loading.show {
            display: inline-block;
        }
        .credentials-info {
            background-color: #f5f5f5;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            border-radius: 4px;
        }
        .credentials-info strong {
            color: #333;
        }
        .toggle-form {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
        .toggle-form button {
            background: none;
            border: none;
            color: #2563eb;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
        }
        .register-panel {
            display: none;
            margin-top: 12px;
        }
        .register-panel.show {
            display: block;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <img src="../logo.png" alt="Logo FiberNOC" class="login-logo">
        <h2>Acesso ao Sistema</h2>
        
        <form id="loginForm">
            <input 
                type="text" 
                id="username" 
                placeholder="Usuário" 
                required
                autocomplete="username"
            >
            <input 
                type="password" 
                id="password" 
                placeholder="Senha" 
                required
                autocomplete="current-password"
            >
            <button type="submit" id="submitBtn">
                <span class="btn-text">Entrar</span>
                <span class="loading" id="loading">⏳ Validando...</span>
            </button>
        </form>

        <div class="register-panel" id="registerPanel">
            <h3>Criar conta</h3>
            <form id="registerForm">
                <input type="text" id="registerUsername" placeholder="Novo usuário" required autocomplete="username">
                <input type="password" id="registerPassword" placeholder="Nova senha" required autocomplete="new-password">
                <button type="submit" id="registerBtn">Criar conta</button>
            </form>
        </div>

        <div class="toggle-form">
            <button type="button" id="toggleFormBtn">Criar uma conta</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="credentials-info">
            <strong>Credenciais de teste:</strong><br>
            👤 <strong>admin</strong> / 🔑 <strong>admin123</strong><br>
            👤 <strong>fibernoc</strong> / 🔑 <strong>senha456</strong><br>
            👤 <strong>tecnico</strong> / 🔑 <strong>tecnico789</strong>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Proteger página de login (redirecionar se já autenticado)
        protectLoginPage();

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const registerUsernameInput = document.getElementById('registerUsername');
        const registerPasswordInput = document.getElementById('registerPassword');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loadingSpan = document.getElementById('loading');
        const btnText = submitBtn.querySelector('.btn-text');
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        const registerPanel = document.getElementById('registerPanel');

        /**
         * Limpa as mensagens de erro/sucesso
         */
        function clearMessages() {
            errorMessage.textContent = '';
            errorMessage.classList.remove('show');
            successMessage.textContent = '';
            successMessage.classList.remove('show');
        }

        /**
         * Mostra mensagem de erro
         */
        function showError(message) {
            clearMessages();
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            passwordInput.focus();
        }

        /**
         * Mostra mensagem de sucesso
         */
        function showSuccess(message) {
            clearMessages();
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        /**
         * Valida o formulário antes de enviar
         */
        function validateForm() {
            clearMessages();

            // Validar campo de usuário
            if (!usernameInput.value.trim()) {
                showError('❌ Por favor, insira o usuário');
                usernameInput.focus();
                return false;
            }

            // Validar comprimento do usuário
            if (usernameInput.value.trim().length < 3) {
                showError('❌ O usuário deve ter pelo menos 3 caracteres');
                usernameInput.focus();
                return false;
            }

            // Validar campo de senha
            if (!passwordInput.value) {
                showError('❌ Por favor, insira a senha');
                passwordInput.focus();
                return false;
            }

            // Validar comprimento da senha
            if (passwordInput.value.length < 6) {
                showError('❌ A senha deve ter pelo menos 6 caracteres');
                passwordInput.focus();
                return false;
            }

            return true;
        }

        /**
         * Simula o envio do formulário com validação
         */
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();

            if (!validateForm()) {
                return;
            }

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            submitBtn.disabled = true;
            loadingSpan.classList.add('show');
            btnText.textContent = '';

            try {
                const authenticated = await login(username, password);

                if (authenticated) {
                    showSuccess(`✅ Bem-vindo, ${username}!`);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 700);
                } else {
                    showError('❌ Usuário ou senha incorretos. Verifique as credenciais.');
                    submitBtn.disabled = false;
                    loadingSpan.classList.remove('show');
                    btnText.textContent = 'Entrar';
                    passwordInput.value = '';
                    usernameInput.focus();
                }
            } catch (error) {
                showError(error instanceof Error ? error.message : '❌ Não foi possível validar o login neste momento.');
                submitBtn.disabled = false;
                loadingSpan.classList.remove('show');
                btnText.textContent = 'Entrar';
                passwordInput.value = '';
                usernameInput.focus();
            }
        });

        /**
         * Limpar mensagens quando o usuário começa a digitar
         */
        usernameInput.addEventListener('input', clearMessages);
        passwordInput.addEventListener('input', clearMessages);
        registerUsernameInput.addEventListener('input', clearMessages);
        registerPasswordInput.addEventListener('input', clearMessages);

        toggleFormBtn.addEventListener('click', () => {
            registerPanel.classList.toggle('show');
            const showingRegister = registerPanel.classList.contains('show');
            toggleFormBtn.textContent = showingRegister ? 'Voltar para o login' : 'Criar uma conta';
            clearMessages();
        });

        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            clearMessages();

            const username = registerUsernameInput.value.trim();
            const password = registerPasswordInput.value;

            if (!username || username.length < 3) {
                showError('❌ O usuário deve ter pelo menos 3 caracteres.');
                registerUsernameInput.focus();
                return;
            }

            if (!password || password.length < 6) {
                showError('❌ A senha deve ter pelo menos 6 caracteres.');
                registerPasswordInput.focus();
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Criando...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.error || 'Não foi possível criar a conta.');
                }

                showSuccess(`✅ Conta criada com sucesso para ${username}!`);
                registerForm.reset();
                registerPanel.classList.remove('show');
                toggleFormBtn.textContent = 'Criar uma conta';
                usernameInput.value = username;
                passwordInput.focus();
            } catch (error) {
                showError(error instanceof Error ? error.message : '❌ Não foi possível criar a conta.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Criar conta';
            }
        });

        usernameInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
