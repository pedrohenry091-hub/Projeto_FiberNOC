<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberNOC - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar collapsed" id="sidebar">
    <img src="logo.png" class="sidebar-logo" alt="Logo FiberNOC">
    <h3>FiberNOC</h3>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="onu.html">ONUs</a>
    </nav>
</aside>

<main class="main-content" id="main">
    <header>
        <button class="menu-toggle" id="btn-toggle-menu" aria-label="Abrir menu">☰</button>
        <h1>Dashboard</h1>
    </header>

    <div class="top-cards">
        <div class="mini-card online">
            <span>ONUs Online</span>
            <strong id="stat-online">-</strong>
        </div>

        <div class="mini-card offline">
            <span>ONUs Offline</span>
            <strong id="stat-offline">-</strong>
        </div>

        <div class="mini-card alert">
            <span>Alerts</span>
            <strong id="stat-alerts">-</strong>
        </div>

        <div class="mini-card">
            <span>CPU Usage</span>
            <strong id="stat-cpu">-</strong>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h2>Network Status</h2>
            <p id="network-status">Carregando...</p>
        </div>

        <div class="panel">
            <h2>Recent Alerts</h2>
            <ul class="alerts" id="list-alerts"></ul>
        </div>
    </div>
</main>

<script type="module" src="script.js"></script>
</body>
</html>
